services:
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - proxy-frontend
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`app.docker.localhost`)"
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls=true"

  php-api:
    container_name: php-api
    build:
      context: ./api-php
      dockerfile: Dockerfile
    env_file:
      - ./.env

    networks:
      - database-php-api
      - proxy-php
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`php-api.docker.localhost`)"
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls=true"

  go-api:
    container_name: go-api
    build:
      context: ./api-go
      dockerfile: Dockerfile
    networks:
      - database-go-api
      - proxy-go
    env_file:
      - ./.env
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`go-api.docker.localhost`)"
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls=true"

  database:
    container_name: db
    image: postgres
    environment:
      POSTGRES_USER: '${DB_USER:-postgres}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-postgres}'
      POSTGRES_DB: '${DB_NAME}'
    volumes:
      - '${PWD}/init.sql:/docker-entrypoint-initdb.d/init.sql'
    networks:
      - database-php-api
      - database-go-api
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready", "-d", "localhost" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  database-php-api:
  database-go-api:
  proxy:
    external: true
  proxy-php:
    external: true
  proxy-go:
    external: true
  proxy-frontend:
    external: true

